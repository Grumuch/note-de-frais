name: NoteDeFrais
options:
  bundleIdPrefix: com.notedefrais
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  NoteDeFrais:
    type: application
    platform: iOS
    sources:
      - path: NoteDeFrais
    info:
      path: NoteDeFrais/Info.plist
      properties:
        CFBundleDisplayName: Note de frais
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "L'application a besoin d'accéder au réseau local pour découvrir et imprimer sur votre imprimante Epson."
        NSBonjourServices:
          - _printer._tcp
          - _pdl-datastream._tcp
          - _ipp._tcp
          - _epson-tm-mfp._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notedefrais.app
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - framework: Vendor/EpsonSDK/libepos2.xcframework
        embed: true
